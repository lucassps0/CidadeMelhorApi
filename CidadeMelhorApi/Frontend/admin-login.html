<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="tela-login">
        <h1>Login do admin</h1>

        <form id="formLoginAdmin">
            <label for="emailAdmin">Email</label>
            <input id="emailAdmin" type="email" value="admin@gmail.com" required>

            <label for="senhaAdmin">Senha</label>
            <input id="senhaAdmin" type="password" value="admin123" required>

            <button type="submit">Entrar</button>
        </form>

        <p id="mensagem"></p>
        <p><a href="login.html">Voltar para login do usuario</a></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
