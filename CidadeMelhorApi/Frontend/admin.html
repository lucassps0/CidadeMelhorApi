<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <strong>Painel Admin</strong>
            <div>
                <a href="index.html">Usuario</a>
                <button type="button" onclick="sairAdmin()">Sair</button>
            </div>
        </nav>

        <h1>Gerenciar denuncias</h1>

        <section class="filtros">
            <label for="filtroCategoria">Categoria</label>
            <select id="filtroCategoria">
                <option value="">Todas</option>
                <option value="Buraco na via">Buraco na via</option>
                <option value="Vazamento">Vazamento</option>
                <option value="Lixo Acumulado">Lixo Acumulado</option>
                <option value="Iluminacao publica">Iluminacao publica</option>
                <option value="Sinalizacao">Sinalizacao</option>
                <option value="outros">Outros</option>
            </select>

            <label for="filtroStatus">Status</label>
            <select id="filtroStatus">
                <option value="">Todos</option>
                <option value="Aberto">Aberto</option>
                <option value="Em andamento">Em andamento</option>
                <option value="Resolvido">Resolvido</option>
            </select>

            <label for="filtroEndereco">Endereco</label>
            <input id="filtroEndereco" type="text" placeholder="Buscar por endereco">

            <button type="button" onclick="carregarAdmin()">Filtrar</button>
        </section>

        <p id="mensagem"></p>
        <ul id="adminLista"></ul>
    </main>

    <script src="script.js"></script>
</body>
</html>
