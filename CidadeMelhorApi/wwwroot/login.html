<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login Usuario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="tela-login">
        <h1>Login do usuario</h1>

        <form id="formLoginUsuario">
            <label for="emailLogin">Email</label>
            <input id="emailLogin" type="email" required>

            <label for="senhaLogin">Senha</label>
            <input id="senhaLogin" type="password" required>

            <button type="submit">Entrar</button>
        </form>

        <p id="mensagem"></p>
        <p>Nao tem conta? <a href="/cadastro.html">Cadastrar usuario</a></p>
        <p><a href="/admin-login.html">Entrar como admin</a></p>
    </main>

    <script src="app.js"></script>
</body>
</html>
