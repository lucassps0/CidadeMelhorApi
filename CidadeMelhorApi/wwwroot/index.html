<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Cidade Melhor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <strong>Cidade Melhor</strong>
            <div>
                <a href="/admin-login.html">Admin</a>
                <button type="button" onclick="sairUsuario()">Sair</button>
            </div>
        </nav>

        <h1>Sistema de Denuncias Urbanas</h1>
        <p id="usuarioLogado"></p>

        <form id="formDenuncia">
            <label for="descricao">Descricao</label>
            <textarea id="descricao" rows="4" required></textarea>

            <label for="categoria">Categoria</label>
            <select id="categoria" required>
                <option value="">Selecione</option>
                <option value="Buraco na via">Buraco na via</option>
                <option value="Vazamento">Vazamento</option>
                <option value="Lixo Acumulado">Lixo Acumulado</option>
                <option value="Iluminacao publica">Iluminacao publica</option>
                <option value="Sinalizacao">Sinalizacao</option>
                <option value="Outros">Outros</option>
            </select>

            <label for="cep">CEP</label>
            <input id="cep" type="text" maxlength="9" placeholder="00000-000" required>
            <button type="button" class="secundario" onclick="buscarCep()">Buscar CEP</button>

            <label for="logradouro">Rua</label>
            <input id="logradouro" type="text" required>

            <label for="bairro">Bairro</label>
            <input id="bairro" type="text" required>

            <label for="cidade">Cidade</label>
            <input id="cidade" type="text" required>

            <label for="uf">UF</label>
            <input id="uf" type="text" maxlength="2" required>

            <label for="numero">Numero</label>
            <input id="numero" type="text" required>

            <label for="complemento">Complemento</label>
            <input id="complemento" type="text" placeholder="Casa, bloco, referencia...">

            <label for="imagem">Foto da denuncia</label>
            <input id="imagem" type="file" accept="image/png,image/jpeg,image/webp">

            <button type="submit">Enviar denuncia</button>
        </form>

        <p id="mensagem"></p>

        <h2>Denuncias cadastradas</h2>
        <ul id="lista"></ul>
    </main>

    <script src="app.js"></script>
</body>
</html>
